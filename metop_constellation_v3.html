const imgSGA1   = new Image();
const imgBC     = new Image();

let loaded = 0;
// -- TLE epochs (yyddd.fraction) -- update these when new TLEs are loaded
const TLE_EPOCH_B    = 26204.29383258;  // Metop-B   (EUMETSAT)
const TLE_EPOCH_C    = 26204.25194103;  // Metop-C   (EUMETSAT)
const TLE_EPOCH_SGA1 = 26204.0;  // Metop-SGA1 (EUMETSAT)

// Convert TLE epoch (yyddd.fraction) to DD/MM/YYYY string
function tleEpochToDate(epoch) {
  const yy   = Math.floor(epoch / 1000);
  const ddd  = epoch - yy * 1000;
  const year = (yy >= 57 ? 1900 : 2000) + yy;
  const jan1 = new Date(year, 0, 1);
  const ms   = (ddd - 1) * 86400000;
  const d    = new Date(jan1.getTime() + ms);
  const dd   = String(d.getUTCDate()).padStart(2,'0');
  const mm   = String(d.getUTCMonth()+1).padStart(2,'0');
  const yyyy = d.getUTCFullYear();
  return dd + '/' + mm + '/' + yyyy;
}

// Use the most recent TLE epoch for the legend date
const latestEpoch = Math.max(TLE_EPOCH_B, TLE_EPOCH_C, TLE_EPOCH_SGA1);
const TLE_DATE = tleEpochToDate(latestEpoch);

function onLoad() { if(++loaded===3) draw(); }

function draw() {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  // ── Seasonal Sun declination from today's date ────────────────────────
  // Drives the terminator tilt and night-side shadow rotation on the Earth
  const now       = new Date();
  const start     = new Date(now.getFullYear(), 0, 0);
  const dayOfYear = Math.floor((now - start) / 86400000);
  // Sun declination approximation (accurate to ~1°)
  const sunDecl    = -23.45 * Math.cos(2 * Math.PI * (dayOfYear + 10) / 365);
  const sunDeclRad = sunDecl * Math.PI / 180;
  // Night hemisphere arc angles — at equinox: -PI/2 to +PI/2 (right side)
  // Positive declination (northern summer) tilts N.Pole into sunlight (shadow rotates CW)
  // Negative declination (northern winter) tilts S.Pole into sunlight (shadow rotates CCW)
  const nightStart = -Math.PI/2 + sunDeclRad;
  const nightEnd   =  Math.PI/2 + sunDeclRad;

  ctx.fillStyle = '#0a0e1a';
  ctx.fillRect(0,0,700,740);

  // Stars
  [[55,48],[128,28],[600,58],[38,200],[650,350],[48,498],[660,248],[200,22],[490,32],[30,590]].forEach(([x,y])=>{
    ctx.fillStyle='rgba(200,200,200,0.35)'; ctx.beginPath(); ctx.arc(x,y,1,0,Math.PI*2); ctx.fill();
  });



  // ── Sun, terminator and Earth shadow — EQUINOX geometry ─────────────────
  // LTAN 21:30, equatorial side view, CCW orbit, equinox (Sun declination = 0°):
  //   Ascending node  = 3 o'clock (right) = LST 21:30 = NIGHT side (eclipse)
  //   Descending node = 9 o'clock (left)  = LST 09:30 = DAY side (sunlit)
  //   Sub-solar point = LST 12:00 = 2.5h east of descending node = 37.5° left of 9-o'clock
  //   Sun direction   = 217.5° (upper-left, ~10:30 o'clock) — unchanged from any season
  //   Terminator      = vertical through both poles (equinox, Sun decl=0°)
  //   Night side      = right hemisphere (ascending node side)
  //   At equinox for LTAN 21:30: beta angle ~52°, NO eclipse occurs







  // ── Sun disc (upper-left, 217.5°, canvas ~36,114) ────────────────────────
  const sunGrad = ctx.createRadialGradient(36,114,0,36,114,24);
  sunGrad.addColorStop(0,'#fff9c4');
  sunGrad.addColorStop(0.4,'#ffe082');
  sunGrad.addColorStop(1,'rgba(255,213,79,0)');
  ctx.fillStyle=sunGrad;
  ctx.beginPath(); ctx.arc(36,114,24,0,Math.PI*2); ctx.fill();
  // Rays around Sun disc
  ctx.strokeStyle='rgba(255,213,79,0.55)'; ctx.lineWidth=1.5;
  for(let i=0;i<8;i++){
    const a=i*Math.PI/4;
    ctx.beginPath();
    ctx.moveTo(36+28*Math.cos(a), 114+28*Math.sin(a));
    ctx.lineTo(36+38*Math.cos(a), 114+38*Math.sin(a));
    ctx.stroke();
  }
  ctx.fillStyle='#aaa'; ctx.font='11px sans-serif'; ctx.textAlign='center';
  ctx.fillText('Sun',36,147);



  // Orbit ellipse
  ctx.save(); ctx.translate(350,365); ctx.scale(240,250);
  ctx.beginPath(); ctx.arc(0,0,1,0,Math.PI*2); ctx.restore();
  ctx.strokeStyle='rgba(102,102,102,0.35)'; ctx.lineWidth=0.8;
  ctx.setLineDash([5,4]); ctx.stroke(); ctx.setLineDash([]);

  // Earth
  const eg=ctx.createRadialGradient(326,338,0,350,365,130);
  eg.addColorStop(0,'#4a9eda'); eg.addColorStop(1,'#1a5fa8');
  ctx.save(); ctx.translate(350,365);
  ctx.beginPath(); ctx.arc(0,0,130,0,Math.PI*2); ctx.fillStyle=eg; ctx.fill(); ctx.restore();

  // Continents
  ctx.fillStyle='rgba(76,175,116,0.85)';
  [
    [[258,282],[268,272],[282,275],[296,272],[302,286],[312,291],[307,310],[302,324],[288,329],[273,334],[263,324],[252,313],[254,299]],
    [[287,340],[297,335],[304,344],[310,358],[307,377],[302,391],[292,393],[282,386],[280,371],[277,356],[280,346]],
    [[347,284],[359,278],[369,286],[376,295],[371,305],[366,300],[359,303],[353,307],[349,297]],
    [[345,308],[356,304],[366,311],[373,320],[371,339],[366,353],[357,358],[347,355],[342,343],[337,328],[340,317]],
    [[372,281],[396,274],[416,281],[431,288],[429,303],[421,310],[407,307],[390,310],[380,300],[370,290]],
    [[410,355],[423,350],[431,360],[436,372],[429,382],[419,386],[410,379],[404,369],[406,359]]
  ].forEach(pts=>{
    ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]);
    pts.slice(1).forEach(p=>ctx.lineTo(p[0],p[1]));
    ctx.closePath(); ctx.fill();
  });

  // Ice caps
  ctx.fillStyle='rgba(232,244,248,0.7)';
  ctx.save(); ctx.translate(350,242); ctx.scale(38,14); ctx.beginPath(); ctx.arc(0,0,1,0,Math.PI*2); ctx.fill(); ctx.restore();
  ctx.save(); ctx.translate(350,488); ctx.scale(38,14); ctx.beginPath(); ctx.arc(0,0,1,0,Math.PI*2); ctx.fill(); ctx.restore();

  // Svalbard CDA ground station (lat 78°N, lon 15°E → canvas ~357, 254)
  // Drawn after ice cap so it sits on top of the Earth surface
  const radW = 26, radH = 17;
  ctx.save();
  ctx.beginPath(); ctx.arc(350,365,130,0,Math.PI*2); ctx.clip(); // clip to Earth
  ctx.drawImage(imgRadome, 344, 248, radW, radH);
  ctx.restore();
  // Small label
  ctx.fillStyle='rgba(255,255,255,0.85)'; ctx.font='bold 8px sans-serif'; ctx.textAlign='center';
  ctx.fillText('Svalbard', 357, 274);

  // Atmosphere rim
  ctx.strokeStyle='rgba(130,196,248,0.18)'; ctx.lineWidth=3; ctx.setLineDash([]);
  ctx.beginPath(); ctx.arc(350,365,130,0,Math.PI*2); ctx.stroke();



  // ── Night-side shadow on Earth — seasonal, driven by Sun declination ───────
  // Arc rotates with sunDeclRad: equinox=vertical, +decl=N.Pole lit, -decl=S.Pole lit

  ctx.save();
  ctx.beginPath(); ctx.arc(350,365,130,0,Math.PI*2); ctx.clip();  // clip to Earth disc
  ctx.beginPath();
  ctx.arc(350,365,130,nightStart,nightEnd,false);
  ctx.closePath();
  ctx.fillStyle='rgba(5,5,25,0.18)';
  ctx.fill();
  ctx.restore();


  // Front arc — right-hand half of orbit, passing near Metop-B at (~589,341)
  // Metop-B is 95.61° ahead of Metop-C (TLE epoch 26 Jun 2026), just past 3 o'clock
  ctx.strokeStyle='rgba(102,102,102,0.45)'; ctx.lineWidth=0.8; ctx.setLineDash([5,4]);
  ctx.beginPath();
  ctx.moveTo(350,115);
  ctx.bezierCurveTo(483,115, 590,227, 590,365);
  ctx.bezierCurveTo(590,503, 483,615, 350,615);
  ctx.stroke();
  ctx.setLineDash([]);

  // Polar axis
  ctx.strokeStyle='rgba(102,102,102,0.3)'; ctx.lineWidth=0.5; ctx.setLineDash([3,6]);
  ctx.beginPath(); ctx.moveTo(350,40); ctx.lineTo(350,640); ctx.stroke(); ctx.setLineDash([]);
  ctx.fillStyle='#888'; ctx.font='11px sans-serif'; ctx.textAlign='center';
  ctx.fillText('N',350,32); ctx.fillText('S',350,700);

  // Orbit arcs
  function orbitArc(a1,a2,color,dash){
    ctx.beginPath();
    const steps=60;
    for(let i=0;i<=steps;i++){
      const t=a1+(a2-a1)*i/steps;
      const x=350+240*Math.cos(t), y=365+250*Math.sin(t);
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.strokeStyle=color; ctx.lineWidth=1.2; ctx.setLineDash(dash||[]); ctx.stroke(); ctx.setLineDash([]);
  }
  // ── Orbit arcs (auto-computed from cumulative phase angle from Metop-C) ──
  // C→SGA1: 173.92° | SGA1→B (orange, reserved for SGB1): 97.10° | B→C: 88.97°
  orbitArc(Math.PI/2, (263.92 * Math.PI / 180), 'rgba(255,152,0,0.65)', [3,3]);
  orbitArc((263.92 * Math.PI / 180), (361.03 * Math.PI / 180), 'rgba(255,152,0,0.65)', [3,3]);
  orbitArc((361.03 * Math.PI / 180), Math.PI*2 + Math.PI/2, 'rgba(255,152,0,0.65)', [3,3]);

  // Arc labels — positioned outside ellipse
  // B→C label at bottom-right
  ctx.fillStyle='#ff9800'; ctx.font='11px sans-serif'; ctx.textAlign='center';
  ctx.fillText('Metop-B to C: 89.0°', 543, 577);
  // C→SGA1 label at bottom-left
  ctx.fillText('Metop-C to SGA1: 173.9°', 153, 548);
  // SGA1→B label: 45° CCW from Metop-B, dynamically computed — reserved for Metop-SGB1 drift-in
  ctx.fillText('Metop-SGA1 to B: 97.1°', 544, 171);


  // ── Metop-SGA1 — EUMETSAT TLE (23/07/2026) ─────────────────────────────
  // TLE epoch 26204.0, propagated to common epoch 26204.29383258
  // SGA1 AoL 65.13deg, Metop-C AoL 239.06deg
  // Phase: 186.08deg CCW ahead of Metop-C (= 173.92deg behind C), drifting toward lead
  // Canvas position: (324.6, 116.4), rotation: -0.1060 rad (-6.08deg)
  ctx.save();
  ctx.translate(324.6, 116.4);
  ctx.rotate(-0.1060);
  ctx.drawImage(imgSGA1,-75,-45,150,91);
  ctx.restore();
  // Arrow in direction of travel (CCW tangent at this position)
  arrow(ctx,294.8,119.6,272.9,121.9,'#e53935');

  roundRect(ctx,264,186,122,34,4,'rgba(26,42,26,0.85)');
  ctx.fillStyle='#a5d6a7'; ctx.font='bold 11px sans-serif'; ctx.textAlign='center';
  ctx.fillText('Metop-SGA1',325,200);
  ctx.fillStyle='#81c784'; ctx.font='11px sans-serif';
  ctx.fillText('2nd gen · Commissioning',325,214);

  // ── Metop-B at 88.97° ahead of Metop-C (TLE-derived, 23/07/2026) ────────
  // Phase angle from TLEs: B is 88.97° CCW ahead of C (at 6 o'clock)
  // Parametric angle on ellipse: 1.03° → canvas position (~590, 369)
  // Image rotation: π/2 + angle = 1.5887 rad (91.03°)
  ctx.save();
  ctx.translate(590.0,369.5);
  ctx.rotate(1.5887);
  ctx.drawImage(imgBC,-75,-46,150,92);
  ctx.restore();
  // Arrow in direction of travel (CCW tangent at this position)
  arrow(ctx,590.5,339.5,590.9,317.5,'#e53935');

  roundRect(ctx,638,362,66,48,4,'rgba(26,42,58,0.85)');
  ctx.fillStyle='#90caf9'; ctx.font='bold 11px sans-serif'; ctx.textAlign='center';
  ctx.fillText('Metop-B',671,376);
  ctx.fillStyle='#64b5f6'; ctx.font='11px sans-serif';
  ctx.fillText('Prime',671,390);
  ctx.fillStyle='#90caf9'; ctx.font='10px sans-serif';
  ctx.fillText('LTAN 20:49',671,403);

  // ── Metop-C at 6 o'clock (350,615) ──────────────────────
  // BC image 150x92, rotate 180°, horiz 275–425, vert 569–661
  // Travelling RIGHTWARD. Arrow right of image (>425)
  ctx.save();
  ctx.translate(350,615);
  ctx.rotate(Math.PI);
  ctx.drawImage(imgBC,-75,-46,150,92);
  ctx.restore();
  arrow(ctx,428,615,446,615,'#e53935');

  roundRect(ctx,366,648,66,34,4,'rgba(26,42,58,0.85)');
  ctx.fillStyle='#90caf9'; ctx.font='bold 11px sans-serif'; ctx.textAlign='center';
  ctx.fillText('Metop-C',399,662);
  ctx.fillStyle='#64b5f6'; ctx.font='11px sans-serif';
  ctx.fillText('Secondary',399,676);

  // ── Legend ───────────────────────────────────────────────
  roundRect(ctx,30,558,248,76,6,'rgba(17,26,36,0.78)');
  ctx.fillStyle='#90caf9'; ctx.font='bold 11px sans-serif'; ctx.textAlign='left';
  ctx.fillText('Key',42,576);
  ctx.fillStyle='#888'; ctx.font='11px sans-serif';
  ctx.fillText(TLE_DATE,76,576);
  ctx.drawImage(imgSGA1,42,582,30,18);
  ctx.fillStyle='#ccc'; ctx.font='11px sans-serif';
  ctx.fillText('SGA1 (2nd gen · Commissioning)',78,595);
  ctx.drawImage(imgBC,42,602,30,18);
  ctx.fillText('B and C (1st gen)',78,615);
  arrow(ctx,58,630,42,630,'#e53935'); ctx.fillText('Flight direction (CCW)',68,634);


  // Decommission note
  roundRect(ctx,448,600,252,36,6,'rgba(42,26,26,0.78)');
  ctx.fillStyle='#ef9a9a'; ctx.font='11px sans-serif'; ctx.textAlign='center';
  ctx.fillText('Metop-A decommissioned Nov 2021',574,614);
  ctx.fillStyle='#888'; ctx.fillText('B and C (1st gen) remain operational',574,630);

  ctx.fillStyle='#888'; ctx.font='11px sans-serif'; ctx.textAlign='center';
  ctx.fillText('Metop constellation — sun-synchronous polar orbit ~817 km',350,718);
}

function arrow(ctx,x1,y1,x2,y2,color){
  ctx.strokeStyle=color; ctx.fillStyle=color; ctx.lineWidth=1.8; ctx.setLineDash([]);
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  const a=Math.atan2(y2-y1,x2-x1);
  ctx.beginPath();
  ctx.moveTo(x2,y2);
  ctx.lineTo(x2-9*Math.cos(a-0.4),y2-9*Math.sin(a-0.4));
  ctx.lineTo(x2-9*Math.cos(a+0.4),y2-9*Math.sin(a+0.4));
  ctx.closePath(); ctx.fill();
}

function roundRect(ctx,x,y,w,h,r,fill){
  ctx.fillStyle=fill; ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r); ctx.closePath(); ctx.fill();
}
